services:
  grafana:
    image: grafana/grafana-oss:13.0.2
    restart: unless-stopped
    mem_limit: 1024m  # 1 GiB hard backstop; bounds any unexpected growth
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:?}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?}
      - GF_SERVER_ROOT_URL=${SERVICE_URL_GRAFANA}
      - GF_SERVER_DOMAIN=${SERVICE_FQDN_GRAFANA}
      - GF_SERVER_ENABLE_GZIP=false  # disable response gzip: the pgzip middleware leaks goroutines per request (Grafana 13.0.2 regression, issue #123017); Cloudflare gzips at the edge anyway
      # Outbound email for alert notifications, via Mailgun SMTP. All values come from env vars (set in Coolify); none are baked in here. Unset → SMTP stays off/inert until you configure them.
      - GF_SMTP_ENABLED=${GF_SMTP_ENABLED}
      - GF_SMTP_HOST=${GF_SMTP_HOST}
      - GF_SMTP_USER=${GF_SMTP_USER}
      - GF_SMTP_PASSWORD=${GF_SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${GF_SMTP_FROM_ADDRESS}
      - GF_SMTP_FROM_NAME=${GF_SMTP_FROM_NAME}
    volumes:
      - o11y-grafana-data:/var/lib/grafana
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/api/health"]
      interval: 5s
      timeout: 20s
      retries: 10

  victoriametrics:
    image: victoriametrics/victoria-metrics:v1.147.0
    restart: unless-stopped
    command:
      - '--promscrape.config=/etc/vm/scrape.yml'
      - '--storageDataPath=/storage'
      - '--retentionPeriod=30d'
    volumes:
      - o11y-vm-data:/storage
      - ./configs/victoriametrics:/etc/vm:ro

  node_exporter:
    image: prom/node-exporter:v1.11.1
    restart: unless-stopped
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.systemd'
    volumes:
      - /:/host:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /run/dbus:/run/dbus:ro
      - /run/udev:/run/udev:ro

  cadvisor:
    image: ghcr.io/google/cadvisor:v0.60.5
    restart: unless-stopped
    command:
      - -store_container_labels=false  # don't turn Docker labels into Prometheus labels: cAdvisor maps every Docker label (Coolify/Traefik routing rules, OCI image metadata) to a container_label_* per series, pushing publicly-routed containers over VictoriaMetrics' default 40-label limit so VM silently drops them; stripping keeps only name/image/instance and shrinks the scrape
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro

  loki:
    image: grafana/loki:3.7.3
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/config.yml
    volumes:
      - o11y-loki-data:/loki
      - ./configs/loki:/etc/loki:ro

  alloy:
    image: grafana/alloy:v1.17.1
    restart: unless-stopped
    user: "0:0"  # root, to read the root:adm 640 log files and the journal files
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
    volumes:
      - ./configs/alloy:/etc/alloy:ro
      - /var/log:/var/log:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  o11y-grafana-data:
    name: o11y-grafana-data
  o11y-vm-data:
    name: o11y-vm-data
  o11y-loki-data:
    name: o11y-loki-data